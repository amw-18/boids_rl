[experiment]
id = "baseline-learned-prey-vs-random-predator"
name = "Learned prey vs random predator"
description = "Candidate benchmark baseline. Supply the prey checkpoint path before running."

study_config = "../../studies/v1_shaped_current.toml"

[evaluation]
num_episodes = 3
seeds = [0, 1, 2]

[prey_policy]
type = "checkpoint"
checkpoint = ""
deterministic = true
label = "learned-prey"

[predator_policy]
type = "random"
deterministic = true
label = "random-predator"

[output]
subdir = "analysis"
