[experiment]
id = "baseline-learned-prey-no-predator-pressure"
name = "Learned prey with no predator pressure"
description = "A no-pressure control. Supply the prey checkpoint path before running."

study_config = "../../studies/v1_shaped_current.toml"

[evaluation]
num_episodes = 3
seeds = [0, 1, 2]

[prey_policy]
type = "checkpoint"
checkpoint = ""
deterministic = true
label = "learned-prey"

[predator_policy]
type = "idle"
deterministic = true
label = "no-predator"

[environment_overrides]
num_predators = 0

[output]
subdir = "analysis"
